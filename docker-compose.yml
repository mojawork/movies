# docker-compose.yml for a PHP server with Apache
# Author: [Your Name]
# Date: $(date +%F)

version: '3.8'

services:
  php-server:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - TMDB_TOKEN=${TMDB_TOKEN}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql